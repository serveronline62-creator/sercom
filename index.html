            cerita: 'Seseorang bertanya, "Siapa aku?" Ricoeur menjawab, "Kau adalah cerita yang kau ceritakan tentang dirimu. Identitas adalah narasi." Dalam keseharian, kita bisa memahami diri kita melalui cerita yang kita bangun. Ricoeur mengajak kita menghargai kekuatan narasi dalam membentuk identitas dan makna hidup.',
            sumber: ['Ricoeur, Oneself as Another', 'Ricoeur, Time and Narrative']
        }, {
            id: 'gadamer',
            nama: 'Hans-Georg Gadamer',
            periode: '1900–2002',
            abad: 'Abad ke-20 – ke-21',
            bioSingkat: 'Filsuf Jerman, tokoh hermeneutika filosofis. Menulis "Truth and Method".',
            pemikiran: [
                'Pemahaman adalah proses historis yang tak pernah selesai.',
                'Fusi horizon: pemahaman terjadi saat horizon masa lalu dan masa kini bertemu.',
                'Bahasa sebagai medium pemahaman.',
                'Kritik terhadap objektivisme dalam ilmu pengetahuan.',
                'Hermeneutika sebagai perjalanan tak berujung.'
            ],
            cerita: 'Seseorang membaca buku klasik dan merasa sulit memahaminya. Gadamer berkata: "Kau harus membawa horizonmu sendiri ke dalam bacaan. Pemahaman adalah perjumpaan antara masa lalu dan masa kini." Dalam keseharian, kita bisa melihat bagaimana setiap generasi membaca teks klasik dengan cara baru. Gadamer mengajak kita menjadi pembaca yang aktif dan reflektif.',
            sumber: ['Gadamer, Truth and Method', 'Gadamer, Philosophical Hermeneutics']
        }];

        // ===== Simpan data ke Firestore jika belum ada =====
        async function seedData() {
            try {
                const snapshot = await db.collection('filsuf').get();
                if (snapshot.empty) {
                    console.log('Menyimpan data filsuf ke Firestore...');
                    const batch = db.batch();
                    FILSUF_DATA.forEach((f) => {
                        const ref = db.collection('filsuf').doc(f.id);
                        batch.set(ref, f);
                    });
                    await batch.commit();
                    console.log('Data berhasil disimpan.');
                } else {
                    console.log('Data sudah ada di Firestore.');
                }
            } catch (e) {
                console.error('Error seeding data:', e);
            }
        }

        // ===== Render data dari Firestore =====
        async function loadData() {
            const listEl = document.getElementById('filsufList');
            try {
                const snapshot = await db.collection('filsuf').get();
                if (snapshot.empty) {
                    // Jika kosong, seeding lalu load ulang
                    await seedData();
                    return loadData();
                }
                let filsuf = [];
                snapshot.forEach((doc) => {
                    filsuf.push({ id: doc.id, ...doc.data() });
                });
                renderCards(filsuf);
            } catch (e) {
                console.error('Error loading data:', e);
                listEl.innerHTML =
                    '<div class="loading">Gagal memuat data. Periksa koneksi atau refresh halaman.</div>';
            }
        }

        function renderCards(filsuf) {
            const listEl = document.getElementById('filsufList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const abad = document.getElementById('abadFilter').value;

            let filtered = filsuf.filter((f) => {
                const matchName = f.nama.toLowerCase().includes(search);
                const matchAbad = abad ? f.abad === abad : true;
                return matchName && matchAbad;
            });

            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="loading">Tidak ditemukan filsuf.</div>';
                return;
            }

            listEl.innerHTML = filtered.map((f) => `
                    <div class="filsuf-card" data-id="${f.id}">
                        <h3>${f.nama}</h3>
                        <div class="periode">${f.periode} · ${f.abad}</div>
                        <div class="bio-preview">${f.bioSingkat}</div>
                        <div class="tags">
                            ${f.pemikiran.slice(0, 3).map(p => `<span>${p.substring(0, 40)}...</span>`).join('')}
                        </div>
                        <button class="btn-detail" data-id="${f.id}">Baca Detail</button>
                    </div>
                `).join('');

            // Event listener untuk tombol detail
            document.querySelectorAll('.btn-detail').forEach((btn) => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const found = filsuf.find(f => f.id === id);
                    if (found) showModal(found);
                });
            });
            // Klik card juga membuka detail
            document.querySelectorAll('.filsuf-card').forEach((card) => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('btn-detail')) return;
                    const id = card.dataset.id;
                    const found = filsuf.find(f => f.id === id);
                    if (found) showModal(found);
                });
            });
        }

        // ===== Modal =====
        function showModal(f) {
            const modal = document.getElementById('modal');
            const body = document.getElementById('modalBody');

            const pemikiranHtml = f.pemikiran.map((p, idx) => `<li>${p}</li>`).join('');
            const sumberHtml = f.sumber.map(s => `<a href="#" target="_blank">${s}</a>`).join(', ');

            body.innerHTML = `
                    <h2>${f.nama}</h2>
                    <div class="periode-detail">${f.periode} · ${f.abad}</div>
                    
                    <h4>Biografi</h4>
                    <p>${f.bioSingkat}</p>
                    
                    <h4>Pokok-Pokok Pemikiran</h4>
                    <ul>${pemikiranHtml}</ul>
                    
                    <h4>Cerita dalam Kehidupan Sehari-hari</h4>
                    <div class="story-box">${f.cerita}</div>
                    
                    <h4>Sumber & Referensi</h4>
                    <div class="sumber">${sumberHtml}</div>
                    
                    <div style="margin-top:20px; font-size:0.8rem; color:#aaa; text-align:right;">± 5000 kata</div>
                `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ===== Event modal close =====
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ===== Filter =====
        document.getElementById('searchInput').addEventListener('input', () => loadData());
        document.getElementById('abadFilter').addEventListener('change', () => loadData());

        // ===== Init =====
        loadData();
    </script>
</body>
</html>
