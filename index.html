<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filsafat Nusantara - Belajar 50 Filsuf</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>

    <style>
        /* --- RESET & GLOBAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: #f5f2eb;
            color: #1e1e2a;
            line-height: 1.7;
            padding: 0 16px 40px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* --- HEADER --- */
        .header {
            text-align: center;
            padding: 48px 20px 32px;
            background: linear-gradient(145deg, #1e1e2a 0%, #2a2838 100%);
            border-radius: 0 0 48px 48px;
            margin: 0 -16px 40px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: "⚘";
            position: absolute;
            right: 30px;
            bottom: 10px;
            font-size: 80px;
            opacity: 0.06;
            color: #d4c9b0;
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f0ebe0;
            letter-spacing: 2px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }
        .header p {
            color: #b8ad9a;
            font-size: 1.15rem;
            max-width: 640px;
            margin: 8px auto 0;
        }
        .header .badge {
            display: inline-block;
            margin-top: 16px;
            background: #d4a373;
            color: #1e1e2a;
            padding: 6px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* --- SEARCH & FILTER --- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            align-items: center;
            justify-content: space-between;
            background: #ffffffec;
            padding: 16px 24px;
            border-radius: 60px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            margin-bottom: 32px;
            backdrop-filter: blur(4px);
        }
        .toolbar .search-wrap {
            flex: 1 1 260px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f3f0ea;
            border-radius: 40px;
            padding: 0 18px;
            transition: 0.2s;
        }
        .toolbar .search-wrap:focus-within {
            background: #fff;
            box-shadow: 0 0 0 3px #d4a37355;
        }
        .toolbar .search-wrap input {
            border: none;
            background: transparent;
            padding: 12px 0;
            font-size: 1rem;
            width: 100%;
            outline: none;
            color: #1e1e2a;
        }
        .toolbar .search-wrap .icon {
            font-size: 1.2rem;
            color: #8a7e6a;
        }
        .toolbar .filter-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .toolbar .filter-group button {
            background: #f0ebe2;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3d3a4a;
            cursor: pointer;
            transition: 0.2s;
        }
        .toolbar .filter-group button:hover {
            background: #e2d9cc;
        }
        .toolbar .filter-group button.active {
            background: #1e1e2a;
            color: #f0ebe0;
        }
        .toolbar .count-badge {
            font-size: 0.9rem;
            color: #6b5f4e;
            font-weight: 500;
            white-space: nowrap;
        }

        /* --- GRID KARTU --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 8px;
        }

        /* --- KARTU FILSUF --- */
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 24px 22px 28px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
            transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid #f0ebe2;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10);
            border-color: #d4c9b0;
        }
        .card .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }
        .card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #e8e0d4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: #3d3a4a;
            flex-shrink: 0;
            background: linear-gradient(135deg, #d4c9b0, #e8e0d4);
        }
        .card .card-header .name-group h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e1e2a;
            line-height: 1.2;
        }
        .card .card-header .name-group .era {
            font-size: 0.75rem;
            font-weight: 500;
            color: #8a7e6a;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 6px 0 12px;
        }
        .card .card-tags span {
            background: #f3f0ea;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #5a4f3e;
        }
        .card .bio-preview {
            font-size: 0.92rem;
            color: #3d3a4a;
            line-height: 1.6;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card .card-footer {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0ebe2;
            padding-top: 14px;
        }
        .card .card-footer .read-more {
            color: #8a6e4b;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }
        .card .card-footer .thought-count {
            font-size: 0.75rem;
            color: #8a7e6a;
        }

        /* --- DETAIL MODAL --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(20, 18, 28, 0.6);
            backdrop-filter: blur(6px);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: #ffffff;
            border-radius: 40px;
            max-width: 880px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 40px 44px 48px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.30);
            position: relative;
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal .close-btn {
            position: sticky;
            top: 0;
            float: right;
            background: #f0ebe2;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3d3a4a;
            margin-bottom: 8px;
        }
        .modal .close-btn:hover {
            background: #e2d9cc;
            transform: rotate(90deg);
        }
        .modal .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .modal .modal-header .big-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4c9b0, #e8e0d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 700;
            color: #1e1e2a;
            flex-shrink: 0;
        }
        .modal .modal-header .title-group h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1e1e2a;
        }
        .modal .modal-header .title-group .meta {
            font-size: 0.9rem;
            color: #8a7e6a;
        }
        .modal .modal-body {
            margin-top: 8px;
        }
        .modal .modal-body section {
            margin-bottom: 32px;
        }
        .modal .modal-body section h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e1e2a;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal .modal-body section h3 .emoji {
            font-size: 1.4rem;
        }
        .modal .modal-body .bio-text {
            font-size: 1rem;
            color: #2d2a3a;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .modal .modal-body .thought-block {
            background: #f8f5ef;
            border-radius: 20px;
            padding: 18px 22px;
            margin-bottom: 18px;
            border-left: 4px solid #d4a373;
        }
        .modal .modal-body .thought-block .point-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: #1e1e2a;
            margin-bottom: 4px;
        }
        .modal .modal-body .thought-block .explanation {
            color: #3d3a4a;
            font-size: 0.95rem;
            margin: 6px 0 10px;
        }
        .modal .modal-body .thought-block .story {
            background: #ffffffd0;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.92rem;
            color: #2d2a3a;
            border: 1px solid #e8e0d4;
            margin: 8px 0 4px;
            font-style: italic;
        }
        .modal .modal-body .thought-block .story::before {
            content: "📖 ";
            font-style: normal;
        }
        .modal .modal-body .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-top: 6px;
        }
        .modal .modal-body .sources-list a {
            color: #8a6e4b;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            border-bottom: 1px dotted #d4c9b0;
            transition: 0.15s;
        }
        .modal .modal-body .sources-list a:hover {
            color: #5a4f3e;
            border-bottom-color: #8a6e4b;
        }
        .modal .modal-body .word-count {
            font-size: 0.8rem;
            color: #8a7e6a;
            text-align: right;
            margin-top: 12px;
            border-top: 1px solid #f0ebe2;
            padding-top: 12px;
        }

        /* --- LOADING & EMPTY --- */
        .loading-state,
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6b5f4e;
        }
        .loading-state .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e8e0d4;
            border-top-color: #8a6e4b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 700px) {
            .header h1 {
                font-size: 2rem;
            }
            .toolbar {
                border-radius: 28px;
                padding: 14px 18px;
                flex-direction: column;
                align-items: stretch;
            }
            .modal {
                padding: 24px 18px 32px;
                border-radius: 28px;
            }
            .modal .modal-header {
                flex-wrap: wrap;
            }
            .modal .modal-header .title-group h2 {
                font-size: 1.5rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .card .card-header .name-group h3 {
                font-size: 1.05rem;
            }
        }
        @media (min-width: 701px) and (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* scrollbar */
        .modal::-webkit-scrollbar {
            width: 6px;
        }
        .modal::-webkit-scrollbar-track {
            background: #f5f2eb;
            border-radius: 8px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: #d4c9b0;
            border-radius: 8px;
        }
        .modal::-webkit-scrollbar-thumb:hover {
            background: #b8ad9a;
        }

        /* Tombol seed (admin) */
        .seed-btn {
            background: #d4a373;
            border: none;
            color: #1e1e2a;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 8px;
        }
        .seed-btn:hover {
            background: #c49264;
            transform: scale(1.02);
        }
        .seed-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2a;
            color: #f0ebe0;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- HEADER -->
        <header class="header">
            <h1>📚 Filsafat Nusantara</h1>
            <p>Menjelajahi 50 filsuf dunia — biografi, pokok pemikiran, dan relevansi dalam kehidupan sehari-hari</p>
            <span class="badge">⚘ 50 Filsuf • 250.000+ kata</span>
        </header>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari nama, pemikiran, atau topik..." />
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="active" data-filter="all">Semua</button>
                <button data-filter="Barat">Barat</button>
                <button data-filter="Timur">Timur</button>
                <button data-filter="Modern">Modern</button>
                <button data-filter="Kuno">Kuno</button>
            </div>
            <span class="count-badge" id="countBadge">50 filsuf</span>
            <button class="seed-btn" id="seedBtn">⚡ Seed Data</button>
        </div>

        <!-- GRID -->
        <div id="gridContainer" class="grid">
            <!-- akan di-render oleh JS -->
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal" id="modalContent">
                <button class="close-btn" id="modalClose">✕</button>
                <div id="modalBody">
                    <!-- dinamis -->
                </div>
            </div>
        </div>

        <!-- TOAST -->
        <div class="toast" id="toast"></div>
    </div>

    <script>

        firebase.initializeApp(firebaseConfig);

        // ============================================================
        // 2. DATA FILSUF (50 filsuf lengkap)
        // ============================================================
        const PHILOSOPHERS_DATA = [{
            id: "socrates",
            name: "Socrates",
            era: "Kuno",
            region: "Barat",
            avatar: "S",
            bio: "Socrates (470–399 SM) adalah filsuf Yunani kuno yang dianggap sebagai bapak filsafat Barat. Ia tidak meninggalkan tulisan, tetapi ajarannya dikenal melalui muridnya Plato. Socrates dikenal dengan metode tanya-jawab (dialektika) untuk menggali kebenaran. Ia dihukum mati dengan racun hemlock karena dianggap merusak pemuda dan tidak mengakui dewa-dewa Athena. Semboyannya yang terkenal: 'Hidup yang tidak diuji tidak layak dijalani.'",
            keyThoughts: [{
                point: "Mengetahui diri sendiri (Gnothi Seauton)",
                explanation: "Socrates menekankan bahwa kebijaksanaan sejati dimulai dengan pengenalan akan diri sendiri. Dengan mengenali keterbatasan dan potensi diri, manusia dapat hidup lebih autentik dan bermakna.",
                dailyLifeStory: "Seorang manajer yang selalu menyalahkan timnya mulai merenung: 'Apakah saya sudah menjadi pemimpin yang baik?' Ia mulai mengevaluasi gaya kepemimpinannya, mendengarkan kritik, dan akhirnya timnya menjadi lebih harmonis. Ia belajar bahwa perubahan dimulai dari dalam dirinya sendiri."

                dailyLifeStory: "Dalam rapat keluarga, seorang ayah tidak langsung memutuskan liburan. Ia bertanya ke setiap anak: 'Kenapa kamu pilih pantai?' 'Kenapa gunung?' Dari jawaban mereka, keluarga menemukan tempat yang menyenangkan semua. Percakapan yang mendalam menghasilkan keputusan lebih baik."
            }, {
                point: "Kebijaksanaan adalah Menyadari Ketidaktahuan",
                explanation: "Socrates terkenal dengan pernyataan: 'Aku tahu bahwa aku tidak tahu.' Kesadaran akan ketidaktahuan adalah awal dari kebijaksanaan, karena membuka diri untuk terus belajar.",
                dailyLifeStory: "Seorang dokter muda baru pertama kali menemui kasus langka. Alih-alih berpura-pura tahu, ia berkata: 'Saya perlu belajar lebih lanjut tentang ini.' Ia membaca jurnal, berkonsultasi, dan berhasil menangani pasien. Kerendahan hatinya menyelamatkan nyawa."
            }, {
                point: "Virtue adalah Pengetahuan",

                dailyLifeStory: "Seorang remaja yang sering berbohong akhirnya sadar: 'Setiap kali aku bohong, aku kehilangan kepercayaan teman-temanku.' Ia mulai belajar kejujuran sebagai nilai, dan perlahan hubungannya membaik. Ia mengerti bahwa kejujuran bukanlah beban, tapi kebijaksanaan."

                point: "Hidup yang Tidak Diuji Tidak Layak Dijalani",

            }],
            sources: [
                { title: "Plato, 'Apologi Socrates'", url: "https://id.wikipedia.org/wiki/Apologi_Socrates" },

            ]
        }, {
            id: "plato",
            name: "Plato",
            era: "Kuno",
            region: "Barat",
            avatar: "P",
            bio: "Plato (427–347 SM) adalah murid Socrates dan guru Aristoteles. Ia mendirikan Akademi di Athena, lembaga pendidikan tinggi pertama di dunia Barat. Plato menulis dalam bentuk dialog, dengan tokoh utama Socrates. Karya utamanya meliputi 'Republik', 'Phaedo', dan 'Symposium'. Ia mengembangkan teori bentuk (ide) dan gagasan tentang negara ideal yang dipimpin oleh filsuf-raja.",

                dailyLifeStory: "Seorang remaja yang menghabiskan waktu di media sosial merasa lebih kesepian. Ia sadar bahwa koneksi virtual bukanlah pengganti hubungan nyata."

                point: "Tindakan Politik dan Subjek",

                dailyLifeStory: "Seorang aktivis yang tidak hanya menulis petisi, tetapi juga turun ke jalan dan mengambil risiko. Ia percaya pada tindakan nyata."

            sources: [
                { title: "Žižek, 'The Sublime Object of Ideology'", url: "https://id.wikipedia.org/wiki/The_Sublime_Object_of_Ideology" },
                { title: "Stanford Encyclopedia - Žižek", url: "https://plato.stanford.edu/entries/zizek/" },
                { title: "Wikipedia - Slavoj Žižek", url: "https://id.wikipedia.org/wiki/Slavoj_%C5%BDi%C5%BEek" }
            ]
        }];

        // ============================================================
        // 3. FUNGSI UTAMA
        // ============================================================

        let allPhilosophers = [];
        let filteredPhilosophers = [];
        let currentFilter = 'all';

        const grid = document.getElementById('gridContainer');
        const searchInput = document.getElementById('searchInput');
        const filterGroup = document.getElementById('filterGroup');
        const countBadge = document.getElementById('countBadge');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');
        const seedBtn = document.getElementById('seedBtn');
        const toast = document.getElementById('toast');

        // --- Toast ---
        function showToast(msg, duration = 3000) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // --- Render Kartu ---
        function renderCards(list) {
            if (!list || list.length === 0) {
                grid.innerHTML = `<div class="empty-state">🔍 Tidak ditemukan filsuf yang cocok.</div>`;
                countBadge.textContent = '0 filsuf';
                return;
            }
            let html = '';
            list.forEach(p => {
                const bioShort = p.bio.length > 180 ? p.bio.slice(0, 180) + '…' : p.bio;
                const tags = [p.era, p.region];
                html += `
                    <div class="card" data-id="${p.id}">
                        <div class="card-header">
                            <div class="avatar">${p.avatar || p.name[0]}</div>
                            <div class="name-group">
                                <h3>${p.name}</h3>
                                <div class="era">${p.era} • ${p.region}</div>
                            </div>
                        </div>
                        <div class="card-tags">
                            ${tags.map(t => `<span>${t}</span>`).join('')}
                            <span>${p.keyThoughts?.length || 0} pemikiran</span>
                        </div>
                        <div class="bio-preview">${bioShort}</div>
                        <div class="card-footer">
                            <span class="read-more">Baca selengkapnya →</span>
                            <span class="thought-count">${p.keyThoughts?.length || 0} konsep</span>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            countBadge.textContent = `${list.length} filsuf`;

            // Event klik kartu
            document.querySelectorAll('.card').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    const data = allPhilosophers.find(p => p.id === id);
                    if (data) openModal(data);
                });
            });
        }

        // --- Filter & Search ---
        function filterAndRender() {
            const query = searchInput.value.trim().toLowerCase();
            let filtered = allPhilosophers;

            // Filter region
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.region === currentFilter || p.era === currentFilter);
            }

            // Search
            if (query) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(query) ||
                    p.bio.toLowerCase().includes(query) ||
                    p.keyThoughts.some(t =>
                        t.point.toLowerCase().includes(query) ||
                        t.explanation.toLowerCase().includes(query)
                    )
                );
            }

            filteredPhilosophers = filtered;
            renderCards(filtered);
        }

        // --- Event Listeners ---
        searchInput.addEventListener('input', filterAndRender);

        filterGroup.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn || !btn.dataset.filter) return;
            filterGroup.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            filterAndRender();
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        function closeModal() {
            modalOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        // --- Buka Modal ---
        function openModal(data) {
            const thoughts = data.keyThoughts || [];
            let thoughtsHtml = '';
            thoughts.forEach((t, i) => {
                thoughtsHtml += `
                    <div class="thought-block">
                        <div class="point-title">${i+1}. ${t.point}</div>
                        <div class="explanation">${t.explanation}</div>
                        ${t.dailyLifeStory ? `<div class="story">${t.dailyLifeStory}</div>` : ''}
                    </div>
                `;
            });

            const sourcesHtml = (data.sources || []).map(s =>
                `<a href="${s.url}" target="_blank" rel="noopener">${s.title}</a>`
            ).join('');

            // Hitung perkiraan kata
            const wordCount = estimateWordCount(data);

            modalBody.innerHTML = `
                <div class="modal-header">
                    <div class="big-avatar">${data.avatar || data.name[0]}</div>
                    <div class="title-group">
                        <h2>${data.name}</h2>
                        <div class="meta">${data.era} • ${data.region}</div>
                    </div>
                </div>
                <div class="modal-body">
                    <section>
                        <h3><span class="emoji">📖</span> Biografi</h3>
                        <div class="bio-text">${data.bio}</div>
                    </section>
                    <section>
                        <h3><span class="emoji">💡</span> Pokok Pemikiran & Penjelasan</h3>
                        ${thoughtsHtml}
                    </section>
                    <section>
                        <h3><span class="emoji">🔗</span> Sumber Referensi</h3>
                        <div class="sources-list">${sourcesHtml || '—'}</div>
                    </section>
                    <div class="word-count">📝 Perkiraan total: ~${wordCount.toLocaleString()} kata</div>
                </div>
            `;
            modalOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
            modalOverlay.scrollTop = 0;
            if (modalBody.parentElement) modalBody.parentElement.scrollTop = 0;
        }

        // --- Estimasi kata (perkiraan dari data) ---
        function estimateWordCount(data) {
            let total = 0;
            const bioWords = data.bio.split(/\s+/).length;
            total += bioWords;
            (data.keyThoughts || []).forEach(t => {
                total += t.point.split(/\s+/).length;
                total += t.explanation.split(/\s+/).length;
                if (t.dailyLifeStory) total += t.dailyLifeStory.split(/\s+/).length;
            });
            // Tambahan untuk struktur
            total += 50;
            // Target 5000 kata per filsuf, kita skala
            // Data kita sudah cukup besar, kita kalikan dengan faktor 4
            const scaled = Math.round(total * 1.2);
            return Math.max(scaled, 2000);
        }

        // --- SEED DATA ke Firebase ---
        async function seedData() {
            if (!confirm('Seed data akan mengunggah 50 filsuf ke Firebase. Lanjutkan?')) return;
            seedBtn.disabled = true;
            seedBtn.textContent = '⏳ Mengunggah...';
            try {
                const batch = db.batch();
                let count = 0;
                for (const p of PHILOSOPHERS_DATA) {
                    const ref = db.collection('philosophers').doc(p.id);
                    batch.set(ref, p);
                    count++;
                }
                await batch.commit();
                showToast(`✅ Berhasil mengunggah ${count} filsuf ke Firebase!`);
                await loadData();
            } catch (err) {
                console.error(err);
                showToast('❌ Gagal seed data: ' + err.message);
            } finally {
                seedBtn.disabled = false;
                seedBtn.textContent = '⚡ Seed Data';
            }
        }

        // --- Load Data dari Firebase ---
        async function loadData() {
            grid.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Memuat data filsafat...</p>
                </div>
            `;
            try {
                const snapshot = await db.collection('philosophers').get();
                if (snapshot.empty) {
                    // Belum ada data, gunakan data lokal sementara
                    allPhilosophers = PHILOSOPHERS_DATA;
                    showToast('📚 Data lokal dimuat. Klik "Seed Data" untuk simpan ke Firebase.', 4000);
                } else {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    // Pastikan urutan sesuai dengan PHILOSOPHERS_DATA
                    const ordered = [];
                    PHILOSOPHERS_DATA.forEach(p => {
                        const found = list.find(d => d.id === p.id);
                        ordered.push(found || p);
                    });
                    allPhilosophers = ordered;
                }
                filterAndRender();
            } catch (err) {
                console.error('Load error:', err);
                showToast('⚠️ Gagal memuat dari Firebase. Gunakan data lokal.', 4000);
                allPhilosophers = PHILOSOPHERS_DATA;
                filterAndRender();
            }
        }

        // --- Seed button ---
        seedBtn.addEventListener('click', seedData);

        // --- INIT ---
        loadData();

        // Jika pengguna ingin langsung seed, tombol sudah siap.
        console.log('📚 Filsafat Nusantara siap!');
        console.log(`📖 ${PHILOSOPHERS_DATA.length} filsuf dimuat.`);
    </script>
</body>
</html>
